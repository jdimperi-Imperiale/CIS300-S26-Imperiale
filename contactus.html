<!DOCTYPE html>
<html lang="en">
    <head>
        <link href="terra.css" rel="stylesheet">
        <title>Terra Real Estate : Contact Form</title>
        <meta charset="utf-8">
    </head>

    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-D0LWQ0YR1V"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-D0LWQ0YR1V');

    <body class="contactus">
        <!--Styling wrapper-->
        <div id="wrapper">
            <header>
                <div id="logo">
                    <img src="logo.png" alt="Terra Real Estate Logo">
                    <h1><a href="index.html">Terra Real Estate</a></h1>
                </div>
                <div id="button">
                    <h1><a href="aboutus.html">About Us</a></h1>
                </div>
            </header>

            <!--visual divider-->
            <div id="divider"></div>
    
            <!--Main content including page-specific navigation-->
            <main class="contactus-main">
                <div class="slogan">
                    <h2>DISCOVER YOUR DREAM HOME</h2>
                    <p>Get in touch with us today to start your journey!</p>
                </div>

                <!--contact form-->
                <form action="#" method="post" class="contact-form">
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="agent">Choose an Agent:</label>
                        <select name="agent" id="agent" required>
                            <option value="">--Please choose an agent--</option>
                            <option value="mike">Mike Weber</option>
                            <option value="ben">Ben Crawford</option>
                            <option value="taylor">Taylor Johnson</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" rows="9" cols="65" required></textarea>
                    </div>
                    <button type="submit">Submit</button>
                </form>

                <p>For site inquiries, please contact <a href="mailto:jdimperi@asu.edu">jdimperi@asu.edu</a></p>
            </main>

            <footer>Copyright &copy; 2026 Terra Real Estate <br>

                <!--Quicklinks-->
                <nav>
                <div class="quicklinks">
                    <a href="index.html">Home</a>
                    <a href="aboutus.html">About Us</a>
                    <a href="properties.html">Properties</a>
                    <a href="realtors.html">Realtors</a>
                    <a href="contactus.html">Contact Us</a>
                </div>
                </nav>

                <!--Socials list
                    *links left intentionally nonfunctional-->
                <div class="socials">
                    <a href="https://www.twitter.com/404" target="_blank">Twitter</a>
                    <a href="https://www.instagram.com/404" target="_blank">Instagram</a>
                    <a href="https://www.vecteezy.com/free-photos/luxury-real-estate">Photos by Vecteezy</a>
                </div>

            </footer>
        </div>
    </body>
</html>
